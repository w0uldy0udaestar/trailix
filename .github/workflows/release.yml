name: Release

# On a v* tag: verify (typecheck + test) and create the GitHub Release.
#
# npm publishing is intentionally NOT automated. The npm account has 2FA on and
# no bypass-2FA automation token is configured, so publishing an automation flow
# here could never actually publish — every release is done manually with
# `npm publish`. Keeping this workflow minimal (no conditional publish step, no
# id-token/provenance) avoids the workflow-validation startup failures the
# earlier publish-automation form hit on v0.1.0–v0.3.0.
on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes "See [CHANGELOG.md](./CHANGELOG.md). Install: \`npx trailix\` (Node 24+)."
        env:
          GH_TOKEN: ${{ github.token }}
