name: Release

# Publishes to npm when a v* tag is pushed. Requires an NPM_TOKEN secret
# (a granular automation token with "bypass 2FA" enabled, since the account
# has 2FA on). Tag with: npm version <patch|minor|major> && git push --tags
on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # Skips cleanly if NPM_TOKEN isn't set (e.g. the first release was
      # published manually) — no red X on a version that's already live.
      - name: Publish to npm
        if: ${{ env.NPM_TOKEN != '' }}
        run: npm publish --provenance --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes "See [CHANGELOG.md](./CHANGELOG.md). Install: \`npx trailix\` (Node 24+)."
        env:
          GH_TOKEN: ${{ github.token }}
